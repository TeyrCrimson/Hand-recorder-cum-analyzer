<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#0E1512" />
    <link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon.png" />
    <title>Hand Log</title>
    <style>
      html, body { margin: 0; background: #0e1512; }
      /* phone responsiveness: no gesture-disambiguation delay on taps,
         no gray tap flash, instant pressed feedback instead */
      button, select, input {
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
      }
      button:active {
        transform: scale(0.95);
        filter: brightness(1.35);
      }
      button { transition: transform 60ms ease-out; }
      /* swipe pager: momentum + no accidental pull-to-refresh mid-swipe */
      html, body { overscroll-behavior-y: contain; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
